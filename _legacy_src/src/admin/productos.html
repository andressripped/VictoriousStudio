<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | Victorious Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    
    <script src="../js/firebase-config.js"></script>
    <link rel="stylesheet" href="../styles/main.css">
    
    <style>
        .producto-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .producto-card:hover {
            border-color: var(--border-medium);
        }
        
        .producto-imagen {
            aspect-ratio: 1;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .producto-imagen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .stock-badge {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-full);
            font-size: 0.625rem;
            font-weight: 700;
        }
        
        .descuento-badge {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: var(--accent-success);
            color: var(--bg-primary);
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-full);
            font-size: 0.625rem;
            font-weight: 700;
        }
        
        .upload-area {
            border: 2px dashed var(--border-medium);
            border-radius: var(--radius-lg);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-area:hover {
            border-color: var(--border-strong);
            background: var(--bg-hover);
        }
        
        .upload-area.has-image {
            border-style: solid;
            border-color: var(--accent-success);
            background: rgba(16, 185, 129, 0.05);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <button class="btn btn-ghost" onclick="history.back()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 style="font-family: var(--font-display); font-size: 1.25rem;">Productos</h1>
            <button class="btn btn-primary btn-sm" onclick="mostrarFormNuevo()">
                <span class="material-symbols-outlined">add</span>
                Nuevo
            </button>
        </div>
    </header>

    <main class="container" style="padding-top: 100px; padding-bottom: 100px;">
        
        <!-- Stats -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem;">
            <div class="card" style="padding: 1rem; text-align: center;">
                <p style="font-size: 0.625rem; text-transform: uppercase; color: var(--text-muted);">Activos</p>
                <p style="font-size: 1.5rem; font-weight: 700;" id="stat-activos">0</p>
            </div>
            <div class="card" style="padding: 1rem; text-align: center;">
                <p style="font-size: 0.625rem; text-transform: uppercase; color: var(--text-muted);">Sin stock</p>
                <p style="font-size: 1.5rem; font-weight: 700; color: var(--accent-danger);" id="stat-sin-stock">0</p>
            </div>
            <div class="card" style="padding: 1rem; text-align: center;">
                <p style="font-size: 0.625rem; text-transform: uppercase; color: var(--text-muted);">Con descuento</p>
                <p style="font-size: 1.5rem; font-weight: 700; color: var(--accent-success);" id="stat-descuento">0</p>
            </div>
        </div>
        
        <!-- Lista productos -->
        <div id="productos-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
            <!-- Generado dinámicamente -->
        </div>
        
        <!-- Modal formulario -->
        <div id="modal-producto" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; overflow-y: auto;">
            <div class="container" style="padding-top: 2rem; padding-bottom: 2rem;">
                <div class="card" style="max-width: 480px; margin: 0 auto;">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="font-family: var(--font-display); font-size: 1.25rem;" id="modal-titulo">Nuevo Producto</h2>
                        <button class="btn btn-ghost" onclick="cerrarModal()">
                            <span class="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    
                    <form id="form-producto" style="padding: 1.5rem;">
                        <input type="hidden" id="prod-id">
                        
                        <!-- Imagen -->
                        <div class="upload-area" onclick="document.getElementById('prod-imagen-input').click()" id="upload-zone">
                            <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 0.5rem;">add_photo_alternate</span>
                            <p style="font-size: 0.875rem; color: var(--text-secondary);">Toca para subir foto</p>
                            <p style="font-size: 0.75rem; color: var(--text-muted);">Cuadrada, máx 2MB</p>
                        </div>
                        <input type="file" id="prod-imagen-input" accept="image/*" style="display: none;" onchange="previewImagen(event)">
                        <img id="preview-imagen" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: var(--radius-md); margin-top: 1rem; display: none;">
                        
                        <!-- Datos -->
                        <div class="form-group" style="margin-top: 1.5rem;">
                            <label class="form-label">Nombre del producto</label>
                            <input type="text" class="form-input" id="prod-nombre" required placeholder="Ej: Cera Matte Finish">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-textarea" id="prod-descripcion" rows="2" placeholder="Descripción corta..."></textarea>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Precio (COP)</label>
                                <input type="number" class="form-input" id="prod-precio" required placeholder="25000">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Stock</label>
                                <input type="number" class="form-input" id="prod-stock" required placeholder="10">
                            </div>
                        </div>
                        
                        <!-- Descuento opcional -->
                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="prod-tiene-descuento" onchange="toggleDescuento()">
                                <span style="font-size: 0.875rem;">Aplicar descuento</span>
                            </label>
                        </div>
                        
                        <div id="descuento-fields" class="hidden" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                            <div class="form-group">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" id="prod-descuento-tipo">
                                    <option value="porcentaje">Porcentaje (%)</option>
                                    <option value="fijo">Monto fijo ($)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Valor</label>
                                <input type="number" class="form-input" id="prod-descuento-valor" placeholder="20">
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="button" class="btn btn-secondary btn-block" onclick="cerrarModal()">Cancelar</button>
                            <button type="submit" class="btn btn-primary btn-block">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </main>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="bottom-nav-content">
            <button class="nav-item" onclick="window.location.href='panel.html'">
                <span class="material-symbols-outlined">dashboard</span>
                Panel
            </button>
            <button class="nav-item" onclick="window.location.href='citas.html'">
                <span class="material-symbols-outlined">calendar_today</span>
                Agenda
            </button>
            <button class="nav-fab" onclick="mostrarFormNuevo()">
                <span class="material-symbols-outlined">add</span>
            </button>
            <button class="nav-item active" onclick="window.location.href='productos.html'">
                <span class="material-symbols-outlined">inventory_2</span>
                Tienda
            </button>
            <button class="nav-item" onclick="window.location.href='../../index.html'">
                <span class="material-symbols-outlined">storefront</span>
                Web
            </button>
        </div>
    </div>

    <script>
        let productos = [];
        let imagenFile = null;
        
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '../../index.html';
                return;
            }
            cargarProductos();
        });
        
        async function cargarProductos() {
            const snapshot = await firebase.firestore()
                .collection('productos')
                .orderBy('creadoEn', 'desc')
                .get();
            
            productos = [];
            const grid = document.getElementById('productos-grid');
            grid.innerHTML = '';
            
            let activos = 0, sinStock = 0, conDescuento = 0;
            
            snapshot.forEach(doc => {
                const prod = doc.data();
                prod.id = doc.id;
                productos.push(prod);
                
                if (prod.activo) activos++;
                if (prod.stock === 0) sinStock++;
                if (prod.descuentoActivo) conDescuento++;
                
                grid.appendChild(crearProductoCard(prod));
            });
            
            document.getElementById('stat-activos').textContent = activos;
            document.getElementById('stat-sin-stock').textContent = sinStock;
            document.getElementById('stat-descuento').textContent = conDescuento;
        }
        
        function crearProductoCard(prod) {
            const div = document.createElement('div');
            div.className = 'producto-card';
            
            const precioFinal = prod.descuentoActivo ? 
                window.firebaseApp.calcularDescuentos(prod.precio, [prod.descuentoActivo]) : 
                prod.precio;
            
            div.innerHTML = `
                <div class="producto-imagen">
                    ${prod.imagenUrl ? 
                        `<img src="${prod.imagenUrl}" alt="${prod.nombre}">` : 
                        `<span class="material-symbols-outlined" style="font-size: 3rem; color: var(--text-muted);">inventory_2</span>`
                    }
                    <span class="stock-badge" style="color: ${prod.stock > 0 ? 'var(--accent-success)' : 'var(--accent-danger)'};">
                        ${prod.stock} uds
                    </span>
                    ${prod.descuentoActivo ? `
                        <span class="descuento-badge">
                            -${prod.descuentoActivo.valor}${prod.descuentoActivo.tipo === 'porcentaje' ? '%' : ''}
                        </span>
                    ` : ''}
                </div>
                <div style="padding: 1rem;">
                    <h4 style="font-weight: 600; font-size: 0.9375rem; margin-bottom: 0.25rem;">${prod.nombre}</h4>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                        ${prod.descripcion || 'Sin descripción'}
                    </p>
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;">
                        <span style="font-size: 1.125rem; font-weight: 700;">
                            ${window.firebaseApp.formatCOP(precioFinal)}
                        </span>
                        ${prod.descuentoActivo ? `
                            <span style="font-size: 0.75rem; color: var(--text-muted); text-decoration: line-through;">
                                ${window.firebaseApp.formatCOP(prod.precio)}
                            </span>
                        ` : ''}
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-top: 1rem;">
                        <button class="btn btn-secondary btn-sm" onclick="editarProducto('${prod.id}')">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <button class="btn btn-ghost btn-sm" style="color: ${prod.activo ? 'var(--accent-success)' : 'var(--text-muted)'}" 
                                onclick="toggleActivo('${prod.id}', ${!prod.activo})">
                            <span class="material-symbols-outlined">${prod.activo ? 'visibility' : 'visibility_off'}</span>
                        </button>
                    </div>
                </div>
            `;
            
            return div;
        }
        
        function mostrarFormNuevo() {
            document.getElementById('modal-titulo').textContent = 'Nuevo Producto';
            document.getElementById('form-producto').reset();
            document.getElementById('prod-id').value = '';
            document.getElementById('preview-imagen').style.display = 'none';
            document.getElementById('upload-zone').classList.remove('has-image');
            document.getElementById('descuento-fields').classList.add('hidden');
            imagenFile = null;
            document.getElementById('modal-producto').classList.remove('hidden');
        }
        
        function editarProducto(id) {
            const prod = productos.find(p => p.id === id);
            if (!prod) return;
            
            document.getElementById('modal-titulo').textContent = 'Editar Producto';
            document.getElementById('prod-id').value = id;
            document.getElementById('prod-nombre').value = prod.nombre;
            document.getElementById('prod-descripcion').value = prod.descripcion || '';
            document.getElementById('prod-precio').value = prod.precio;
            document.getElementById('prod-stock').value = prod.stock;
            
            if (prod.imagenUrl) {
                document.getElementById('preview-imagen').src = prod.imagenUrl;
                document.getElementById('preview-imagen').style.display = 'block';
                document.getElementById('upload-zone').classList.add('has-image');
            }
            
            if (prod.descuentoActivo) {
                document.getElementById('prod-tiene-descuento').checked = true;
                document.getElementById('descuento-fields').classList.remove('hidden');
                document.getElementById('prod-descuento-tipo').value = prod.descuentoActivo.tipo;
                document.getElementById('prod-descuento-valor').value = prod.descuentoActivo.valor;
            }
            
            document.getElementById('modal-producto').classList.remove('hidden');
        }
        
        function toggleDescuento() {
            const checked = document.getElementById('prod-tiene-descuento').checked;
            document.getElementById('descuento-fields').classList.toggle('hidden', !checked);
        }
        
        function previewImagen(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            imagenFile = file;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-imagen').src = e.target.result;
                document.getElementById('preview-imagen').style.display = 'block';
                document.getElementById('upload-zone').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }
        
        document.getElementById('form-producto').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('prod-id').value;
            const nombre = document.getElementById('prod-nombre').value;
            const descripcion = document.getElementById('prod-descripcion').value;
            const precio = parseInt(document.getElementById('prod-precio').value);
            const stock = parseInt(document.getElementById('prod-stock').value);
            
            let imagenUrl = null;
            if (imagenFile) {
                const storageRef = firebase.storage().ref();
                const fileRef = storageRef.child(`productos/${Date.now()}_${imagenFile.name}`);
                await fileRef.put(imagenFile);
                imagenUrl = await fileRef.getDownloadURL();
            }
            
            const tieneDescuento = document.getElementById('prod-tiene-descuento').checked;
            const descuentoActivo = tieneDescuento ? {
                tipo: document.getElementById('prod-descuento-tipo').value,
                valor: parseInt(document.getElementById('prod-descuento-valor').value)
            } : null;
            
            const data = {
                nombre,
                descripcion,
                precio,
                stock,
                activo: true,
                descuentoActivo,
                actualizadoEn: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            if (imagenUrl) data.imagenUrl = imagenUrl;
            
            try {
                if (id) {
                    // Actualizar
                    await firebase.firestore().collection('productos').doc(id).update(data);
                } else {
                    // Crear
                    data.creadoEn = firebase.firestore.FieldValue.serverTimestamp();
                    await firebase.firestore().collection('productos').add(data);
                }
                
                cerrarModal();
                cargarProductos();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al guardar. Intenta de nuevo.');
            }
        });
        
        async function toggleActivo(id, nuevoEstado) {
            await firebase.firestore().collection('productos').doc(id).update({
                activo: nuevoEstado
            });
            cargarProductos();
        }
        
        function cerrarModal() {
            document.getElementById('modal-producto').classList.add('hidden');
        }
    </script>
</body>
</html>
