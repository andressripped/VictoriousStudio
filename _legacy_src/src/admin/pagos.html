<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos por Confirmar | Victorious Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script src="../js/firebase-config.js"></script>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <button class="btn btn-ghost" onclick="history.back()">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 style="font-family: var(--font-display); font-size: 1.25rem;">Pagos Nequi</h1>
            <button class="btn btn-ghost" onclick="logout()">
                <span class="material-symbols-outlined">logout</span>
            </button>
        </div>
    </header>

    <main class="container" style="padding-top: 100px; padding-bottom: 100px;">
        
        <div id="pagos-container">
            <p style="text-align: center; color: var(--text-muted); padding: 3rem;">Cargando...</p>
        </div>
        
    </main>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <div class="bottom-nav-content">
            <button class="nav-item" onclick="window.location.href='panel.html'">
                <span class="material-symbols-outlined">dashboard</span>
                Panel
            </button>
            <button class="nav-item" onclick="window.location.href='citas.html'">
                <span class="material-symbols-outlined">calendar_today</span>
                Agenda
            </button>
            <button class="nav-fab" onclick="window.location.href='citas.html?action=nueva'">
                <span class="material-symbols-outlined">add</span>
            </button>
            <button class="nav-item" onclick="window.location.href='productos.html'">
                <span class="material-symbols-outlined">inventory_2</span>
                Tienda
            </button>
            <button class="nav-item" onclick="window.location.href='../../index.html'">
                <span class="material-symbols-outlined">storefront</span>
                Web
            </button>
        </div>
    </div>

    <script>
        firebase.auth().onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = '../../index.html';
                return;
            }
            cargarPagos();
        });
        
        async function cargarPagos() {
            const snapshot = await firebase.firestore()
                .collection('citas')
                .where('estadoPago', '==', 'en_revision')
                .orderBy('creadaEn', 'desc')
                .get();
            
            const container = document.getElementById('pagos-container');
            
            if (snapshot.empty) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: var(--text-muted);">
                        <span class="material-symbols-outlined" style="font-size: 3rem; margin-bottom: 1rem;">check_circle</span>
                        <p>No hay pagos pendientes por confirmar</p>
                        <button class="btn btn-primary btn-sm" style="margin-top: 1rem;" onclick="window.location.href='panel.html'">
                            Volver al panel
                        </button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = '';
            snapshot.forEach(doc => {
                const cita = doc.data();
                cita.id = doc.id;
                container.appendChild(crearPagoCard(cita));
            });
        }
        
        function crearPagoCard(cita) {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.marginBottom = '1rem';
            div.style.borderLeft = '3px solid var(--accent-warning)';
            
            div.innerHTML = `
                <div style="padding: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <div style="display: flex; gap: 1rem;">
                            <img src="${cita.clienteFoto || 'https://via.placeholder.com/50'}" 
                                 style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
                            <div>
                                <h3 style="font-weight: 600;">${cita.clienteNombre}</h3>
                                <p style="font-size: 0.875rem; color: var(--text-muted);">${cita.fecha} • ${cita.hora}</p>
                            </div>
                        </div>
                        <span class="badge badge-revision">En revisión</span>
                    </div>
                    
                    <div style="background: var(--bg-tertiary); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 1rem;">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">Monto a confirmar:</p>
                        <p style="font-size: 1.5rem; font-weight: 700;">${window.firebaseApp.formatCOP(cita.precioFinal)}</p>
                        ${cita.notaPago ? `<p style="font-size: 0.875rem; color: var(--text-secondary); margin-top: 0.5rem; font-style: italic;">"${cita.notaPago}"</p>` : ''}
                    </div>
                    
                    ${cita.comprobanteUrl ? `
                    <div style="margin-bottom: 1rem;">
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem;">Comprobante:</p>
                        <img src="${cita.comprobanteUrl}" style="width: 100%; max-height: 300px; object-fit: cover; border-radius: var(--radius-md); cursor: pointer;" 
                             onclick="window.open('${cita.comprobanteUrl}', '_blank')">
                    </div>
                    ` : '<p style="color: var(--accent-danger); margin-bottom: 1rem;">⚠️ Sin comprobante adjunto</p>'}
                    
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
                        <button class="btn btn-success btn-block" onclick="confirmarPago('${cita.id}', '${cita.clienteId}')">
                            <span class="material-symbols-outlined">check</span>
                            Confirmar Pago
                        </button>
                        <button class="btn btn-danger btn-block" onclick="rechazarPago('${cita.id}')">
                            <span class="material-symbols-outlined">close</span>
                            Rechazar
                        </button>
                    </div>
                </div>
            `;
            
            return div;
        }
        
        async function confirmarPago(citaId, clienteId) {
            if (!confirm('¿Confirmas que recibiste este pago en tu Nequi?')) return;
            
            try {
                await firebase.firestore().collection('citas').doc(citaId).update({
                    estadoPago: 'confirmado',
                    estado: 'confirmado',
                    pagoConfirmadoEn: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Incrementar cortes del cliente
                await firebase.firestore().collection('clientes').doc(clienteId).update({
                    cortesCompletados: firebase.firestore.FieldValue.increment(1)
                });
                
                // Verificar fidelización
                const clienteDoc = await firebase.firestore().collection('clientes').doc(clienteId).get();
                const clienteData = clienteDoc.data();
                const nuevosCortes = (clienteData.cortesCompletados || 0) + 1;
                
                if (nuevosCortes % 10 === 0) {
                    await firebase.firestore().collection('clientes').doc(clienteId).update({
                        tieneCorteGratis: true
                    });
                }
                
                alert('✅ Pago confirmado. Cita activada.');
                cargarPagos();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al confirmar pago');
            }
        }
        
        async function rechazarPago(citaId) {
            const motivo = prompt('Motivo del rechazo:');
            if (!motivo) return;
            
            try {
                await firebase.firestore().collection('citas').doc(citaId).update({
                    estadoPago: 'rechazado',
                    estado: 'cancelada',
                    motivoRechazo: motivo,
                    rechazadoEn: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert('❌ Pago rechazado. Se notificará al cliente.');
                cargarPagos();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al rechazar pago');
            }
        }
        
        function logout() {
            firebase.auth().signOut();
        }
    </script>
</body>
</html>
