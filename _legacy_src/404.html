<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Página no encontrada</title>
    <style>
        /* Estilos base: Minimalismo y calidez */
        body { 
            background: #fdfcfb; /* Un blanco roto, más cálido que el puro */
            color: #4a4a4a; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        #container { 
            max-width: 450px; 
            padding: 40px 20px;
        }

        /* El número 404, sutil */
        .error-code { 
            font-size: 14px; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            color: #b0bec5; 
            margin-bottom: 20px;
            font-weight: 600;
        }

        h1 { 
            font-size: 28px; 
            font-weight: 400; 
            color: #2c3e50; 
            margin-bottom: 16px;
        }

        p { 
            line-height: 1.6; 
            font-size: 16px; 
            color: #6d7278;
            margin-bottom: 32px; 
        }

        /* Botón suave y elegante */
        .btn { 
            display: inline-block; 
            text-decoration: none; 
            color: #fff; 
            background: #8e9eab; /* Un gris azulado suave */
            padding: 12px 30px; 
            border-radius: 50px; 
            transition: background 0.3s ease;
            font-size: 14px;
        }

        .btn:hover { 
            background: #74828f; 
        }

        /* Línea decorativa minimalista */
        .divider {
            width: 40px;
            height: 1px;
            background: #d1d1d1;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="error-code">Error 404</div>
        <h1>Parece que nos perdimos.</h1>
        <div class="divider"></div>
        <p>
            Buscamos por todos los rincones, pero la página que intentas visitar ya no está aquí o se movió a un lugar mejor.
        </p>
        <a href="/" class="btn">Volver al inicio</a>
    </div>

</body>
</html>
